<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Modern Britain — Britannia Archive</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Work+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = { darkMode: 'class', theme: { extend: {
  fontFamily: { serif: ['"Instrument Serif"','Georgia','serif'], sans: ['"Work Sans"','system-ui','sans-serif'] },
  colors: {
    background: 'oklch(0.05 0 0)', foreground: 'oklch(0.92 0 0)',
    card: 'oklch(0.08 0 0)', 'card-foreground': 'oklch(0.92 0 0)',
    primary: { DEFAULT: 'oklch(0.72 0.12 85)' },
    muted: { DEFAULT: 'oklch(0.14 0 0)', foreground: 'oklch(0.55 0 0)' },
    border: 'oklch(0.18 0 0)',
    gold: { DEFAULT: 'oklch(0.72 0.12 85)' },
  },
}}};
</script>
<style>
  body{background:oklch(0.05 0 0);color:oklch(0.92 0 0);font-family:"Work Sans",system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4,h5,h6{font-family:"Instrument Serif",Georgia,serif;font-weight:400;}
</style>
</head>
<body>

<header class="fixed top-0 left-0 right-0 z-50 bg-background/80 backdrop-blur-md border-b border-border">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="flex h-16 items-center justify-between">
      <a href="index.html" class="flex items-center gap-2">
        <span class="text-xl font-serif tracking-tight text-foreground">Britannia</span>
        <span class="text-gold text-xs font-sans tracking-widest uppercase">Archive</span>
      </a>
      <nav class="hidden md:flex items-center gap-8">
        <a href="index.html" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Home</a>
        <a href="medieval.html" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Medieval</a>
        <a href="tudor-stuart.html" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Tudor & Stuart</a>
        <a href="georgian-victorian.html" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Georgian & Victorian</a>
        <a href="modern.html" class="text-sm text-gold transition-colors">Modern</a>
      </nav>
    </div>
  </div>
</header>

<main class="flex-1 pt-16">
<section class="relative">
  <div class="h-[50vh] min-h-[400px] relative overflow-hidden">
    <img src="assets/modern-era.jpg" alt="Modern Era Background" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-background via-background/50 to-background/20"></div>
  </div>
  <div class="absolute bottom-0 left-0 right-0 pb-12">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <h1 id="page-title" class="text-4xl sm:text-5xl lg:text-6xl font-serif text-foreground">Loading...</h1>
    </div>
  </div>
</section>

<article id="dynamic-page-content" class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8 py-20">
  <p class="text-muted-foreground text-center animate-pulse">Loading historical records...</p>
</article>

<section class="border-t border-border bg-card/10">
  <div class="mx-auto max-w-4xl px-4 sm:px-6 lg:px-8 py-20">
    <div class="mb-10">
      <p class="text-gold text-xs font-sans uppercase tracking-[0.3em] mb-2">From the Archive</p>
      <h2 class="text-2xl sm:text-3xl font-serif text-foreground">Archive Articles</h2>
    </div>
    <div id="archive-articles" class="grid gap-6 sm:grid-cols-2"></div>
  </div>
</section>
</main>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const supabase = createClient('https://yhxswwoelahkvkwgwarc.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InloeHN3d29lbGFoa3Zrd2d3YXJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NjQ5MTAsImV4cCI6MjA5NTI0MDkxMH0.xNucx3QZQCgonysDFspXEs6Ek6Ctss7hL0QNrR-43uM');

  // Fetch Main Page Data
  (async () => {
    const { data: page, error } = await supabase.from('pages').select('*').eq('slug', 'modern').single();
    if (page && document.getElementById('dynamic-page-content')) {
      document.getElementById('page-title').innerText = page.title;
      document.getElementById('dynamic-page-content').innerHTML = `
        <p class="text-xl text-muted-foreground leading-relaxed font-light">${page.intro_text}</p>
        <div class="mt-16 text-muted-foreground leading-relaxed space-y-6">${page.main_content}</div>
      `;
    }
  })();

  // Fetch Era Articles
  (async () => {
    const container = document.getElementById('archive-articles');
    const { data, error } = await supabase.from('articles').select('*').ilike('era', '%Modern%').order('created_at', { ascending: false });
    if (data) {
      container.innerHTML = data.map(a => `
        <div class="bg-card border border-border rounded-lg p-6">
          <p class="text-gold text-[10px] font-sans uppercase tracking-[0.2em] mb-2">${a.era || ''}</p>
          <h3 class="font-serif text-xl text-foreground mb-3">${a.title}</h3>
          <p class="text-sm text-muted-foreground leading-relaxed">${(a.content || '').slice(0, 200)}...</p>
        </div>`).join('');
    }
  })();
</script>
</body>
</html>
